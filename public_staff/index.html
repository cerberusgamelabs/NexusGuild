<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexusGuild Staff Portal</title>
    <link rel="stylesheet" href="/css/staff.css">
</head>
<body>

<!-- ─── Login Screen ───────────────────────────────────────────────────────── -->
<div id="loginScreen" class="login-screen">
    <div class="login-card">
        <div class="login-logo">
            <span class="login-logo-icon">⚙</span>
            <span class="login-logo-text">NexusGuild Staff</span>
        </div>
        <h2>Sign in to Staff Portal</h2>
        <div id="loginError" class="login-error" style="display:none"></div>
        <input id="loginEmail" type="email" placeholder="Email" autocomplete="email">
        <input id="loginPassword" type="password" placeholder="Password" autocomplete="current-password">
        <button id="loginBtn" onclick="login()">Sign In</button>
    </div>
</div>

<!-- ─── Main Dashboard ─────────────────────────────────────────────────────── -->
<div id="mainApp" class="main-app" style="display:none">

    <!-- Top bar -->
    <header class="topbar">
        <div class="topbar-brand">
            <span class="topbar-icon">⚙</span>
            <span class="topbar-title">NexusGuild Staff</span>
        </div>
        <div class="topbar-right">
            <span id="topbarRole" class="role-badge"></span>
            <span id="topbarUsername" class="topbar-username"></span>
            <button class="btn-ghost" onclick="logout()">Logout</button>
        </div>
    </header>

    <div class="layout">
        <!-- Sidebar -->
        <nav class="sidebar">
            <ul class="nav-list">
                <li class="nav-item active" data-tab="dashboard" onclick="showTab('dashboard')">
                    <span class="nav-icon">📊</span> Dashboard
                </li>
                <li class="nav-item" data-tab="users" onclick="showTab('users')">
                    <span class="nav-icon">👥</span> Users
                </li>
                <li class="nav-item" data-tab="servers" onclick="showTab('servers')">
                    <span class="nav-icon">🖥</span> Servers
                </li>
                <li class="nav-item" data-tab="ascension" onclick="showTab('ascension')">
                    <span class="nav-icon">✨</span> Ascension
                </li>
                <li class="nav-item" data-tab="audit" onclick="showTab('audit')">
                    <span class="nav-icon">📋</span> Audit Log
                </li>
                <li class="nav-item nav-moderator-only" data-tab="inbox" onclick="showTab('inbox')" style="display:none">
                    <span class="nav-icon">📬</span> Inbox
                </li>
                <li class="nav-item nav-moderator-only" data-tab="reports" onclick="showTab('reports')" style="display:none">
                    <span class="nav-icon">🚩</span> Reports
                </li>
                <li class="nav-divider"></li>
                <li class="nav-item nav-superadmin-only" data-tab="cors" onclick="showTab('cors')" style="display:none">
                    <span class="nav-icon">🔗</span> API Origins
                </li>
                <li class="nav-item nav-owner-only" data-tab="staff" onclick="showTab('staff')" style="display:none">
                    <span class="nav-icon">🛡</span> Staff Roster
                </li>
            </ul>
        </nav>

        <!-- Content area -->
        <main id="contentArea" class="content-area">
            <div class="loading">Loading…</div>
        </main>
    </div>
</div>

<!-- ─── Modal Overlay ──────────────────────────────────────────────────────── -->
<div id="modalOverlay" class="modal-overlay" style="display:none" onclick="closeModalOnBackdrop(event)">
    <div class="modal-box" id="modalBox">
        <div class="modal-header">
            <h3 id="modalTitle"></h3>
            <button class="modal-close" onclick="closeModal()">✕</button>
        </div>
        <div id="modalBody" class="modal-body"></div>
        <div id="modalFooter" class="modal-footer"></div>
    </div>
</div>

<!-- ─── Toast ──────────────────────────────────────────────────────────────── -->
<div id="toastContainer" class="toast-container"></div>

<script src="/js/staff.js"></script>
</body>
</html>
