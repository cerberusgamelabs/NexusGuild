<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password — NexusGuild</title>
    <link rel="icon" href="/img/favicon.ico">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #1e1f22; color: #dbdee1;
            min-height: 100vh; display: flex; align-items: center; justify-content: center;
            padding: 24px;
        }
        .card {
            background: #2b2d31; border: 1px solid #1e1f22;
            border-radius: 12px; padding: 36px 32px;
            width: 100%; max-width: 400px;
        }
        h2 { font-size: 22px; color: #fff; margin-bottom: 8px; }
        p  { font-size: 14px; color: #949ba4; margin-bottom: 20px; line-height: 1.5; }
        label { display: block; font-size: 12px; font-weight: 700; text-transform: uppercase;
                letter-spacing: .04em; color: #b5bac1; margin-bottom: 6px; }
        input[type="password"] {
            width: 100%; padding: 10px 12px; background: #1e1f22;
            border: 1px solid #1e1f22; border-radius: 4px;
            color: #dbdee1; font-size: 14px; outline: none; margin-bottom: 16px;
            font-family: inherit; transition: border-color .15s;
        }
        input[type="password"]:focus { border-color: #5865f2; }
        button {
            width: 100%; padding: 11px; background: #5865f2; color: #fff;
            border: none; border-radius: 4px; font-size: 14px; font-weight: 600;
            cursor: pointer;
        }
        button:hover { background: #4752c4; }
        button:disabled { background: #4e5058; cursor: not-allowed; }
        .msg { font-size: 13px; margin-top: 12px; text-align: center; }
        .msg.error   { color: #da373c; }
        .msg.success { color: #23a559; }
        a { color: #5865f2; text-decoration: none; }
        a:hover { text-decoration: underline; }
    </style>
</head>
<body>
<div class="card" id="card">
    <div style="color:#949ba4;text-align:center;padding:24px 0;">Loading...</div>
</div>
<script>
const token = new URLSearchParams(location.search).get('token');

function showInvalid() {
    document.getElementById('card').innerHTML = `
        <h2>Invalid Link</h2>
        <p>This reset link is invalid or has expired. Reset links are valid for 1 hour.</p>
        <a href="/">← Back to NexusGuild</a>`;
}

function showForm() {
    document.getElementById('card').innerHTML = `
        <h2>Set New Password</h2>
        <p>Choose a new password for your NexusGuild account.</p>
        <label>New Password</label>
        <input type="password" id="pw1" placeholder="At least 8 characters">
        <label>Confirm Password</label>
        <input type="password" id="pw2" placeholder="Repeat password">
        <button onclick="submit()">Reset Password</button>
        <div id="msg" class="msg"></div>`;
}

async function submit() {
    const pw1 = document.getElementById('pw1').value;
    const pw2 = document.getElementById('pw2').value;
    const msgEl = document.getElementById('msg');
    const btn = document.querySelector('button');

    if (pw1.length < 8) { setMsg('error', 'Password must be at least 8 characters.'); return; }
    if (pw1 !== pw2)    { setMsg('error', 'Passwords do not match.'); return; }

    btn.disabled = true;
    const res = await fetch('/api/auth/reset-password/confirm', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token, newPassword: pw1 }),
    });
    const data = await res.json();
    if (!res.ok) { setMsg('error', data.error || 'Failed to reset password.'); btn.disabled = false; return; }

    setMsg('success', 'Password reset! Redirecting to login...');
    setTimeout(() => location.href = '/', 2000);
}

function setMsg(type, text) {
    const el = document.getElementById('msg');
    el.className = `msg ${type}`;
    el.textContent = text;
}

if (!token) { showInvalid(); } else { showForm(); }
</script>
</body>
</html>
