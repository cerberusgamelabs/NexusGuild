<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Bot — NexusGuild</title>
    <link rel="icon" href="/img/favicon.ico">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #1e1f22;
            color: #dbdee1;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }
        .card {
            background: #2b2d31;
            border: 1px solid #1e1f22;
            border-radius: 12px;
            padding: 36px 32px;
            width: 100%;
            max-width: 440px;
        }
        .bot-header {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 20px;
        }
        .bot-avatar {
            width: 64px; height: 64px;
            border-radius: 50%;
            background: #5865f2;
            display: flex; align-items: center; justify-content: center;
            font-size: 32px;
            overflow: hidden; flex-shrink: 0;
        }
        .bot-avatar img { width: 100%; height: 100%; object-fit: cover; }
        .bot-name { font-size: 22px; font-weight: 700; color: #fff; }
        .bot-badge { display: inline-block; background: #5865f2; color: #fff; font-size: 11px; font-weight: 700; padding: 2px 6px; border-radius: 4px; margin-top: 4px; }
        .bot-desc { color: #949ba4; font-size: 14px; line-height: 1.5; margin-bottom: 24px; }
        label { display: block; font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: .04em; color: #b5bac1; margin-bottom: 6px; }
        select {
            width: 100%; padding: 10px 12px;
            background: #1e1f22; border: 1px solid #1e1f22;
            border-radius: 4px; color: #dbdee1; font-size: 14px;
            outline: none; font-family: inherit;
        }
        select:focus { border-color: #5865f2; }
        .actions { display: flex; gap: 10px; margin-top: 20px; }
        .btn {
            flex: 1; padding: 11px; border: none; border-radius: 4px;
            font-size: 14px; font-weight: 600; cursor: pointer; text-align: center; text-decoration: none;
        }
        .btn-primary { background: #5865f2; color: #fff; }
        .btn-primary:hover { background: #4752c4; }
        .btn-secondary { background: #4e5058; color: #fff; }
        .btn-secondary:hover { background: #6d6f78; }
        .msg { font-size: 13px; margin-top: 12px; text-align: center; }
        .msg.error { color: #da373c; }
        .msg.success { color: #23a559; }
        .login-prompt { text-align: center; }
        .login-prompt p { color: #949ba4; margin-bottom: 16px; }
        .not-found { text-align: center; }
        .not-found p { color: #949ba4; margin-top: 8px; }
        .perms-section { margin-bottom: 20px; }
        .perms-label { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: .04em; color: #b5bac1; margin-bottom: 8px; }
        .perms-list { background: #1e1f22; border-radius: 4px; padding: 4px 0; max-height: 240px; overflow-y: auto; }
        .perm-item { display: flex; align-items: center; gap: 10px; padding: 7px 12px; cursor: pointer; }
        .perm-item:hover { background: #2b2d31; }
        .perm-item input[type=checkbox] { accent-color: #5865f2; width: 15px; height: 15px; flex-shrink: 0; cursor: pointer; }
        .perm-item label { font-size: 13px; color: #dbdee1; cursor: pointer; flex: 1; }
        .perm-group-header { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; color: #949ba4; padding: 8px 12px 4px; }
        .perm-none { padding: 12px; text-align: center; color: #949ba4; font-size: 13px; }
    </style>
</head>
<body>
<div class="card" id="card">
    <div style="color:#949ba4;text-align:center;padding:24px 0;">Loading...</div>
</div>
<script>
const API = '';
const botId = location.pathname.split('/').pop();

// Permission definitions shown on the invite page
const INVITE_PERMS = [
    { group: 'General' },
    { label: 'Administrator',        bit: 8n },
    { label: 'Manage Server',        bit: 32n },
    { label: 'Manage Channels',      bit: 16n },
    { label: 'Manage Roles',         bit: 268435456n },
    { label: 'Kick Members',         bit: 2n },
    { label: 'Ban Members',          bit: 4n },
    { label: 'Moderate Members',     bit: 1099511627776n },
    { label: 'Manage Webhooks',      bit: 536870912n },
    { group: 'Text' },
    { label: 'View Channels',        bit: 1024n },
    { label: 'Send Messages',        bit: 2048n },
    { label: 'Manage Messages',      bit: 8192n },
    { label: 'Embed Links',          bit: 16384n },
    { label: 'Attach Files',         bit: 32768n },
    { label: 'Read Message History', bit: 65536n },
    { label: 'Mention @everyone',    bit: 131072n },
    { label: 'Add Reactions',        bit: 64n },
];

async function init() {
    // Load bot info (public)
    const botRes = await fetch(`${API}/api/bots/${botId}/public`).catch(() => null);
    if (!botRes || !botRes.ok) { showNotFound(); return; }
    const { bot } = await botRes.json();

    // Check if user is logged in
    const meRes = await fetch(`${API}/api/auth/me`, { credentials: 'include' }).catch(() => null);
    if (!meRes || !meRes.ok) { showLogin(bot); return; }
    const me = await meRes.json();

    // Load only servers where the user can add bots (owner or administrator)
    const srvRes = await fetch(`${API}/api/bots/eligible-servers`, { credentials: 'include' }).catch(() => null);
    const servers = srvRes?.ok ? (await srvRes.json()).servers || [] : [];

    showInvite(bot, servers);
}

function showNotFound() {
    document.getElementById('card').innerHTML = `
        <div class="not-found">
            <div style="font-size:48px;margin-bottom:12px;">🤖</div>
            <h2 style="color:#fff;">Bot not found</h2>
            <p>This bot doesn't exist or has been deleted.</p>
            <a href="/" style="display:inline-block;margin-top:16px;color:#5865f2;">← Back to NexusGuild</a>
        </div>`;
}

function showLogin(bot) {
    document.getElementById('card').innerHTML = `
        <div class="bot-header">
            <div class="bot-avatar">${bot.avatar ? `<img src="/img/avatars/${bot.avatar}" alt="">` : '🤖'}</div>
            <div>
                <div class="bot-name">${esc(bot.name)}</div>
                <span class="bot-badge">BOT</span>
            </div>
        </div>
        ${bot.description ? `<p class="bot-desc">${esc(bot.description)}</p>` : ''}
        <div class="login-prompt">
            <p>You need to be logged in to NexusGuild to add this bot.</p>
            <a href="/?redirect=${encodeURIComponent(location.href)}" class="btn btn-primary" style="display:block;">Log in to NexusGuild</a>
        </div>`;
}

function buildPermChecklist(defaultPerms) {
    const bits = BigInt(defaultPerms || 0);
    // Only render permissions the bot actually requests
    const requested = INVITE_PERMS.filter(p => p.group || (bits & p.bit) === p.bit);
    if (requested.filter(p => !p.group).length === 0) {
        return `<div class="perm-none">This bot requests no special permissions.</div>`;
    }
    return requested.map(p => {
        if (p.group) return `<div class="perm-group-header">${p.group}</div>`;
        return `<div class="perm-item">
            <input type="checkbox" id="perm_${p.bit}" data-bit="${p.bit}" checked>
            <label for="perm_${p.bit}">${p.label}</label>
        </div>`;
    }).join('');
}

function getApprovedPermissions() {
    let result = 0n;
    document.querySelectorAll('.perm-item input[type=checkbox]:checked').forEach(cb => {
        result |= BigInt(cb.dataset.bit);
    });
    return result;
}

function showInvite(bot, servers) {
    const opts = servers.length
        ? servers.map(s => `<option value="${s.id}">${esc(s.name)}</option>`).join('')
        : '<option value="" disabled>No eligible servers (must be owner or administrator)</option>';

    const defaultPerms = BigInt(bot.default_permissions || 0);
    const hasPerms = defaultPerms > 0n;

    document.getElementById('card').innerHTML = `
        <div class="bot-header">
            <div class="bot-avatar">${bot.avatar ? `<img src="/img/avatars/${bot.avatar}" alt="">` : '🤖'}</div>
            <div>
                <div class="bot-name">${esc(bot.name)}</div>
                <span class="bot-badge">BOT</span>
            </div>
        </div>
        ${bot.description ? `<p class="bot-desc">${esc(bot.description)}</p>` : ''}
        <label>Add to server</label>
        <select id="serverSelect" style="margin-bottom:20px;">${opts}</select>
        ${hasPerms ? `
        <div class="perms-section">
            <div class="perms-label">Permissions requested</div>
            <p style="font-size:12px;color:#949ba4;margin-bottom:8px;">Uncheck any permissions you don't want to grant.</p>
            <div class="perms-list">${buildPermChecklist(bot.default_permissions)}</div>
        </div>` : ''}
        <div class="actions">
            <a href="/" class="btn btn-secondary">Cancel</a>
            <button class="btn btn-primary" onclick="addBot()">Authorize</button>
        </div>
        <div id="msg" class="msg"></div>`;
}

async function addBot() {
    const serverId = document.getElementById('serverSelect')?.value;
    const msgEl = document.getElementById('msg');
    if (!serverId) { msgEl.className = 'msg error'; msgEl.textContent = 'Select a server.'; return; }

    const approvedPermissions = getApprovedPermissions().toString();

    const res = await fetch(`${API}/api/bots/${botId}/servers/${serverId}`, {
        method: 'PUT',
        credentials: 'include',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ permissions: approvedPermissions }),
    });
    const data = await res.json();
    if (!res.ok) {
        msgEl.className = 'msg error';
        msgEl.textContent = data.error || 'Failed to add bot.';
        return;
    }
    msgEl.className = 'msg success';
    msgEl.textContent = 'Bot added! Redirecting...';
    setTimeout(() => location.href = '/', 1500);
}

function esc(str) {
    return String(str ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

init();
</script>
</body>
</html>
